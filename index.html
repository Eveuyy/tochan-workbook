:root{
  --cream:#FBF3E7;
  --paper:#FFFDF8;
  --ink:#2E2620;
  --ink-soft:#7A6C5D;
  --line:#EAD9C2;
  --pink:#F6D7E1;
  --pink-deep:#C15C82;
  --peach:#FBE0BE;
  --peach-deep:#C97A34;
  --sage:#D9E6D0;
  --sage-deep:#4C7A5B;
  --lilac:#E7DDF3;
  --lilac-deep:#7C5DA6;
  --shadow:rgba(120,72,48,.12);
  color-scheme:light;
}
/* This workbook is a deliberate single (light, pastel-paper) visual world —
   pinned intentionally under both theme signals rather than inverted. */
@media (prefers-color-scheme:dark){
  :root{
    --cream:#FBF3E7; --paper:#FFFDF8; --ink:#2E2620; --ink-soft:#7A6C5D;
    --line:#EAD9C2; --pink:#F6D7E1; --pink-deep:#C15C82; --peach:#FBE0BE;
    --peach-deep:#C97A34; --sage:#D9E6D0; --sage-deep:#4C7A5B;
    --lilac:#E7DDF3; --lilac-deep:#7C5DA6; --shadow:rgba(120,72,48,.12);
  }
}
:root[data-theme="dark"]{
  --cream:#FBF3E7; --paper:#FFFDF8; --ink:#2E2620; --ink-soft:#7A6C5D;
  --line:#EAD9C2; --pink:#F6D7E1; --pink-deep:#C15C82; --peach:#FBE0BE;
  --peach-deep:#C97A34; --sage:#D9E6D0; --sage-deep:#4C7A5B;
  --lilac:#E7DDF3; --lilac-deep:#7C5DA6; --shadow:rgba(120,72,48,.12);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Rubik','Segoe UI',Arial,sans-serif;
  direction:rtl;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3{font-weight:700;text-wrap:balance;margin:0;}
p{margin:0;}
::selection{background:var(--pink);color:var(--ink);}
:focus-visible{outline:3px solid var(--pink-deep);outline-offset:2px;border-radius:6px;}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important;}}

.num{font-family:'Fredoka','Rubik',sans-serif;font-variant-numeric:tabular-nums;}

/* ===== toolbar ===== */
.toolbar{
  position:sticky;top:0;z-index:50;
  background:rgba(251,243,231,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  padding:10px clamp(14px,4vw,32px);
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.toolbar .brand{font-weight:700;font-size:1rem;white-space:nowrap;}
.toolbar .brand span{color:var(--pink-deep);}
.progress-wrap{flex:1 1 160px;min-width:120px;display:flex;align-items:center;gap:10px;}
.progress-track{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--pink-deep),var(--peach-deep));border-radius:99px;transition:width .3s ease;}
.progress-label{font-size:.78rem;color:var(--ink-soft);white-space:nowrap;font-variant-numeric:tabular-nums;}
.jump-select{
  font-family:inherit;font-size:.85rem;color:var(--ink);
  background:var(--paper);border:1.5px solid var(--line);border-radius:12px;
  padding:7px 10px;max-width:180px;cursor:pointer;
}
.btn{
  font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;
  border-radius:12px;padding:8px 16px;border:1.5px solid transparent;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  transition:transform .12s ease, box-shadow .12s ease;
}
.btn:active{transform:translateY(1px);}
.btn-primary{background:var(--pink-deep);color:#fff;}
.btn-primary:hover{box-shadow:0 4px 14px rgba(193,92,130,.35);}
.btn-ghost{background:transparent;color:var(--peach-deep);border-color:var(--peach-deep);}
.btn-ghost:hover{background:rgba(201,122,52,.08);}
.save-note{font-size:.72rem;color:var(--ink-soft);}

/* ===== page shell ===== */
.book{max-width:1000px;margin:0 auto;padding:28px clamp(10px,3vw,24px) 80px;}
.page{
  position:relative;overflow:hidden;
  background:var(--paper);
  width:min(210mm,100%);
  margin:0 auto 40px;
  border-radius:28px;
  box-shadow:0 14px 34px var(--shadow);
  padding:clamp(30px,6vw,72px) clamp(22px,6vw,64px);
}
.blob{position:absolute;border-radius:44% 56% 62% 38%/48% 42% 58% 52%;filter:blur(0px);opacity:.55;z-index:0;pointer-events:none;}
.page > *{position:relative;z-index:1;}
.icon{width:34px;height:34px;flex:none;stroke:var(--pink-deep);}
.icon-lg{width:54px;height:54px;}

/* cover */
.page-cover{text-align:center;min-height:min(1000px,80vh);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
.cover-eyebrow{font-size:1rem;font-weight:600;color:var(--pink-deep);letter-spacing:.04em;}
.cover-title{font-size:clamp(2.4rem,7vw,4rem);}
.cover-quote{max-width:34ch;font-size:clamp(1.05rem,2.6vw,1.3rem);color:var(--ink-soft);}
.cover-icon{width:64px;height:64px;stroke:var(--sage-deep);}

/* info page */
.page-info{display:flex;flex-direction:column;align-items:center;text-align:center;gap:20px;}
.info-card{
  background:var(--sage);border:1.5px solid rgba(76,122,91,.28);
  border-radius:22px;padding:clamp(20px,4vw,32px);max-width:60ch;
  font-size:1.05rem;line-height:1.85;
}
.info-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}

/* task chrome */
.label-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--pink);color:var(--pink-deep);
  font-weight:700;font-size:.82rem;letter-spacing:.03em;
  padding:7px 18px;border-radius:99px;margin-bottom:16px;
}
.page-title{font-size:clamp(1.7rem,4.4vw,2.5rem);margin-bottom:20px;}
.page-number-badge{
  position:absolute;left:clamp(14px,4vw,36px);top:clamp(10px,3vw,26px);
  font-size:clamp(2.6rem,7vw,4.2rem);font-weight:700;
  color:var(--peach-deep);opacity:.16;z-index:0;line-height:1;
}
.intro-box{
  background:var(--sage);border:1.5px solid rgba(76,122,91,.25);
  border-radius:20px;padding:clamp(16px,3vw,26px);margin-bottom:26px;
  line-height:1.8;display:flex;gap:14px;align-items:flex-start;
}
.intro-box .icon{stroke:var(--sage-deep);margin-top:2px;}
.explain-box{
  background:var(--lilac);border:1.5px solid rgba(124,93,166,.25);
  border-radius:20px;padding:clamp(16px,3vw,26px);margin-bottom:26px;line-height:1.8;
}
.instructions-line{
  display:flex;align-items:center;gap:10px;
  color:var(--peach-deep);font-weight:600;margin-bottom:20px;font-size:.98rem;
}
.instructions-line .icon{width:22px;height:22px;stroke:var(--peach-deep);}
.section-heading{font-size:1.18rem;font-weight:700;margin:30px 0 14px;}
.section-heading:first-child{margin-top:0;}
.closing-text{
  margin-top:26px;font-style:normal;font-weight:600;color:var(--sage-deep);
  border-top:1.5px dashed var(--line);padding-top:18px;
}

/* field stacking */
.stack{display:flex;flex-direction:column;gap:20px;}
.field{display:flex;flex-direction:column;gap:8px;}
.field-label{font-weight:600;font-size:.98rem;}
.field-label .hint{font-weight:400;color:var(--ink-soft);font-size:.85rem;display:block;margin-top:2px;}
input[type=text].input, textarea.input{
  width:100%;background:var(--paper);border:1.6px solid var(--line);
  border-radius:14px;padding:12px 16px;font-family:inherit;font-size:1rem;
  color:var(--ink);resize:vertical;
}
textarea.input{min-height:5.2em;line-height:1.7;}
input[type=text].input:focus, textarea.input:focus{border-color:var(--pink-deep);}
.numbered-list{display:flex;flex-direction:column;gap:12px;}
.numbered-row{display:flex;align-items:center;gap:12px;}
.numbered-row .num{
  flex:none;width:30px;height:30px;border-radius:50%;background:var(--pink);
  color:var(--pink-deep);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.95rem;
}
.numbered-row input.input{flex:1;}

/* checkbox groups */
.check-group{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;}
@media (max-width:560px){.check-group{grid-template-columns:1fr;}}
.check-group.single-col{grid-template-columns:1fr;}
.check-option{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  padding:9px 12px;border-radius:14px;transition:background .12s ease;
}
.check-option:hover{background:rgba(246,215,225,.35);}
.check-option input{position:absolute;opacity:0;width:1px;height:1px;}
.check-option .box{
  flex:none;width:22px;height:22px;border-radius:7px;border:2px solid var(--pink-deep);
  background:var(--paper);position:relative;
}
.check-option input:checked + .box{background:var(--pink-deep);}
.check-option input:checked + .box::after{
  content:"";position:absolute;inset:0;margin:auto;width:11px;height:6px;
  border-left:2.5px solid #fff;border-bottom:2.5px solid #fff;
  transform:translateY(-1px) rotate(-45deg);
}
.check-option input:focus-visible + .box{outline:3px solid var(--pink-deep);outline-offset:2px;}
.check-option .txt{font-size:.96rem;}
.check-option-wrap{grid-column:1/-1;display:flex;flex-direction:column;gap:6px;}
.check-option-wrap .other-input{
  margin-inline-start:44px;max-width:calc(100% - 44px);
  background:var(--paper);border:1.6px solid var(--line);border-radius:12px;
  font-family:inherit;font-size:.92rem;padding:9px 14px;color:var(--ink);
}
.check-option-wrap .other-input:focus{outline:none;border-color:var(--pink-deep);}
.check-option-wrap .other-input::placeholder{color:var(--ink-soft);}

/* cards */
.cards-row{display:grid;gap:20px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));}
.card{
  background:var(--paper);border:1.6px solid var(--pink);border-radius:22px;
  padding:22px;display:flex;flex-direction:column;gap:16px;box-shadow:0 6px 16px rgba(193,92,130,.08);
}
.card-title{font-weight:700;font-size:1.05rem;color:var(--pink-deep);}

/* example / static boxes */
.example-box{
  background:var(--peach);border:1.6px dashed var(--peach-deep);border-radius:20px;
  padding:clamp(16px,3vw,24px);margin:22px 0;
}
.example-title{font-weight:700;color:var(--peach-deep);margin-bottom:10px;font-size:.95rem;}
.example-text{white-space:pre-line;line-height:1.85;}

/* AI agent link box */
.agent-link-box{
  background:var(--lilac);border:1.6px solid rgba(124,93,166,.3);border-radius:20px;
  padding:clamp(16px,3vw,22px);margin:22px 0;display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;
}
.agent-link-text{display:flex;gap:12px;align-items:flex-start;flex:1 1 220px;line-height:1.7;}
.agent-link-text .icon{stroke:var(--lilac-deep);margin-top:2px;}
.agent-link-box .btn-primary{background:var(--lilac-deep);flex:none;}
.agent-link-box .btn-primary:hover{box-shadow:0 4px 14px rgba(124,93,166,.35);}

/* rating scale */
.rating-row{display:flex;gap:8px;flex-wrap:wrap;}
.rating-btn{
  font-family:'Fredoka','Rubik',sans-serif;font-weight:600;font-size:1.05rem;
  width:42px;height:42px;border-radius:50%;border:1.6px solid var(--line);
  background:var(--paper);color:var(--ink);cursor:pointer;
}
.rating-btn[aria-pressed="true"]{background:var(--pink-deep);border-color:var(--pink-deep);color:#fff;}

/* sun diagram (task 4) — radial layout on comfortable screens */
.sun-wrap{display:flex;flex-direction:column;align-items:center;margin:10px 0 26px;}
.sun-diagram{position:relative;width:min(560px,94vw);aspect-ratio:1;margin:0 auto;}
.sun-lines{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}
.sun-lines line{stroke:var(--peach-deep);stroke-width:.5;opacity:.5;}
.sun-center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:36%;aspect-ratio:1;border-radius:50%;z-index:2;
  background:var(--peach);border:2px solid var(--peach-deep);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  text-align:center;padding:10%;
}
.sun-center .field-label{color:var(--peach-deep);font-size:.85rem;}
.sun-center input.input{text-align:center;border-color:var(--peach-deep);padding:8px 6px;font-size:.85rem;}
.sun-ray-input{
  position:absolute;transform:translate(-50%,-50%);z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  width:clamp(64px,20vw,112px);
}
.sun-ray-input .ray-num{
  width:20px;height:20px;border-radius:50%;background:var(--sage);color:var(--sage-deep);
  display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;
}
.sun-ray-input input.input{padding:6px 8px;font-size:.78rem;text-align:center;border-radius:10px;}
@media (max-width:480px){
  .sun-diagram{display:grid;grid-template-columns:1fr 1fr;position:static;width:100%;aspect-ratio:auto;gap:10px;}
  .sun-lines{display:none;}
  .sun-center{position:static;transform:none;width:100%;grid-column:1/-1;margin-bottom:6px;padding:16px;}
  .sun-ray-input{position:static;transform:none;width:100%;flex-direction:row;justify-content:flex-start;}
}

/* pause / "go film now" banner */
.pause-banner{
  display:flex;align-items:center;gap:14px;background:var(--pink);
  border:2px dashed var(--pink-deep);border-radius:20px;padding:18px 22px;
  margin:30px 0;font-weight:700;font-size:1.05rem;color:var(--pink-deep);line-height:1.6;
}
.pause-banner .icon{stroke:var(--pink-deep);}

/* two-week planner */
.week-grid{display:grid;gap:20px;grid-template-columns:1fr 1fr;}
@media (max-width:700px){.week-grid{grid-template-columns:1fr;}}
.week-col{border-radius:22px;padding:20px;display:flex;flex-direction:column;gap:16px;}
.week-col.w1{background:var(--pink);}
.week-col.w2{background:var(--sage);}
.week-col-title{font-weight:700;font-size:1.1rem;}
.video-card{background:var(--paper);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.video-card .video-title{font-weight:600;font-size:.9rem;color:var(--ink-soft);}

/* signature */
.signature-input{
  border:none;border-bottom:2.5px dashed var(--pink-deep);background:transparent;
  font-size:1.3rem;padding:10px 4px;width:100%;font-family:inherit;color:var(--ink);
}
.signature-input:focus{outline:none;}

/* final page */
.page-final{text-align:center;}
.final-title{font-size:clamp(1.9rem,5vw,2.7rem);margin-bottom:22px;}
.final-oath{font-size:1.15rem;line-height:2;margin-bottom:26px;}
.final-oath .blank-name{display:inline-block;min-width:200px;border-bottom:2px solid var(--ink);}

footer.done-footer{text-align:center;color:var(--ink-soft);font-size:.85rem;padding:20px 0 60px;}

/* ===== print ===== */
@media print{
  @page{size:A4;margin:14mm;}
  .toolbar{display:none !important;}
  body{background:#fff;}
  .book{padding:0;max-width:none;}
  .page{
    box-shadow:none;border-radius:0;width:auto;margin:0;
    page-break-after:always;padding:0;
  }
  .blob{display:none;}
  .page-number-badge{opacity:.25;}
  /* print = always a blank fillable copy, regardless of digital answers */
  input.input, textarea.input, .other-input{
    color:transparent !important;-webkit-text-fill-color:transparent !important;
  }
  textarea.input{
    background-image:repeating-linear-gradient(var(--paper) 0 1.6em, var(--line) 1.6em calc(1.6em + 1px));
    background-attachment:local;
  }
  input[type=text].input{border:none;border-bottom:1.6px solid var(--ink);border-radius:0;background:none;padding:8px 2px;}
  .check-option input:checked + .box{background:var(--paper) !important;}
  .check-option input:checked + .box::after{content:none !important;}
  .signature-input{color:transparent !important;-webkit-text-fill-color:transparent !important;}
  .rating-btn[aria-pressed="true"]{background:var(--paper) !important;color:var(--ink) !important;}
}
</style>
</head>

  rocket:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c3 2 5 6 4.5 11.5L12 18l-4.5-4.5C7 8 9 4 12 2z"/><path d="M9 15l-3 1 1-3M15 15l3 1-1-3"/><circle cx="12" cy="9.5" r="1.6"/></svg>',
  flag:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V4"/><path d="M6 5c3-1.5 4.5 1.5 7.5 0S18 5 18 5v8s-1.5 1.5-4.5 0-4.5-1.5-7.5 0"/></svg>',
  location:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3"/><circle cx="12" cy="12" r="2.6"/></svg>',
  clock:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
  upload:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4M8 8l4-4 4 4"/><path d="M4 15v4h16v-4"/></svg>',
  sun:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.4M12 19v2.5M4.2 4.2l1.7 1.7M18 18l1.8 1.8M2.5 12h2.4M19 12h2.5M4.2 19.8L6 18M18 6l1.8-1.8"/></svg>',
};
function icon(name){return ICONS[name]||'';}
function iconLg(name){return (ICONS[name]||'').replace('class="icon"','class="icon icon-lg"');}

/* ===== tiny blob decoration helper ===== */
function blobsHTML(seedColors){
  return seedColors.map((c,i)=>{
    const size=[130,90,150,70][i%4];
    const pos=[
      {top:'-40px',left:'-40px'},{bottom:'-30px',right:'-30px'},
      {top:'20%',right:'-50px'},{bottom:'10%',left:'-45px'}
    ][i%4];
    const posCss=Object.entries(pos).map(([k,v])=>`${k}:${v}`).join(';');
    return `<div class="blob" style="width:${size}px;height:${size}px;background:${c};${posCss}"></div>`;
  }).join('');
}

/* ===== state (autosave) ===== */
const STORAGE_KEY='tocan_workbook_v1';
let STATE={};
function loadState(){
  try{STATE=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};}catch(e){STATE={};}
}
function saveState(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(STATE));
  updateProgress();
}
loadState();

/* ===== field renderers ===== */
function fieldWrap(id,kind,inner){
  return `<div class="field track" data-id="${id}" data-kind="${kind}">${inner}</div>`;
}
function labelHTML(label,hint){
  if(!label) return '';
  return `<label class="field-label" for="${label.forId||''}">${label.text||label}${hint?`<span class="hint">${hint}</span>`:''}</label>`;
}
function textInput(id,labelText,opts={}){
  const ph=opts.placeholder?` placeholder="${opts.placeholder}"`:'';
  return fieldWrap(id,'text',`
    <label class="field-label" for="${id}">${labelText}</label>
    <input class="input" type="text" id="${id}" data-field="${id}"${ph}>
  `);
}
function dateInput(id,labelText,opts={}){
  return textInput(id,labelText,{placeholder:opts.placeholder||'לדוגמה: 12.08.2026'});
}
function textareaField(id,labelText){
  return fieldWrap(id,'textarea',`
    <label class="field-label" for="${id}">${labelText}</label>
    <textarea class="input" id="${id}" data-field="${id}"></textarea>
  `);
}
function numberedInputs(idPrefix,items){
  const rows=items.map((label,i)=>{
    const id=`${idPrefix}_${i+1}`;
    return `<div class="numbered-row field track" data-id="${id}" data-kind="text">
      <span class="num">${i+1}</span>
      <input class="input" type="text" id="${id}" data-field="${id}"${label?` placeholder="${label}"`:''}>
    </div>`;
  }).join('');
  return `<div class="numbered-list">${rows}</div>`;
}
function checkboxGroup(id,heading,options,opts={}){
  const optsHTML=options.map((o,i)=>{
    const optId=`${id}_${i}`;
    if(o.other){
      return `<div class="check-option-wrap">
        <label class="check-option" for="${optId}">
          <input type="checkbox" id="${optId}" data-field="${id}" data-val="${o.value}">
          <span class="box"></span>
          <span class="txt">${o.label}</span>
        </label>
        <input type="text" class="other-input" data-field="${id}_other" data-other-of="${optId}" placeholder="כתבו כאן...">
      </div>`;
    }
    return `<label class="check-option" for="${optId}">
      <input type="checkbox" id="${optId}" data-field="${id}" data-val="${o.value}">
      <span class="box"></span>
      <span class="txt">${o.label}</span>
    </label>`;
  }).join('');
  const singleCol=opts.cols===1||options.length<=3||options.some(o=>o.label&&o.label.length>28);
  return fieldWrap(id,'checkgroup',`
    ${heading?`<div class="field-label">${heading}</div>`:''}
    <div class="check-group${singleCol?' single-col':''}">${optsHTML}</div>
  `);
}
function ratingScale(id,labelText,max=10){
  const btns=Array.from({length:max},(_,i)=>i+1).map(n=>
    `<button type="button" class="rating-btn num" data-field="${id}" data-rate="${n}" aria-pressed="false">${n}</button>`
  ).join('');
  return fieldWrap(id,'rating',`
    <div class="field-label">${labelText}</div>
    <div class="rating-row">${btns}</div>
  `);
}
function signatureField(id,labelText){
  return fieldWrap(id,'text',`
    <label class="field-label" for="${id}">${labelText}</label>
    <input class="signature-input" type="text" id="${id}" data-field="${id}">
  `);
}
function exampleBox(title,text){
  return `<div class="example-box"><div class="example-title">${title}</div><div class="example-text">${text}</div></div>`;
}
function sectionHeading(text){return `<div class="section-heading">${text}</div>`;}
function plainPara(text){return `<p style="margin-bottom:18px;line-height:1.8;">${text}</p>`;}
function instructionsLine(text){return `<div class="instructions-line">${icon('flag')}<span>${text}</span></div>`;}
function closingText(text){return `<div class="closing-text">${text}</div>`;}
function card(title,innerBlocks){
  return `<div class="card"><div class="card-title">${title}</div>${innerBlocks.join('')}</div>`;
}
function cardsRow(cardsHTML){return `<div class="cards-row">${cardsHTML.join('')}</div>`;}

function renderBlock(b){
  switch(b.b){
    case 'intro': return `<div class="intro-box">${icon(b.icon||'bulb')}<div>${b.text}</div></div>`;
    case 'explain': return `<div class="explain-box">${b.text}</div>`;
    case 'instructions': return instructionsLine(b.text);
    case 'section': return sectionHeading(b.text);
    case 'p': return plainPara(b.text);
    case 'text': return textInput(b.id,b.label,b.opts||{});
    case 'date': return dateInput(b.id,b.label,b.opts||{});
    case 'textarea': return textareaField(b.id,b.label);
    case 'numbered': return (b.lead?plainPara(b.lead):'')+numberedInputs(b.idPrefix,b.items);
    case 'checkbox': return checkboxGroup(b.id,b.heading,b.options,{cols:b.cols});
    case 'rating': return ratingScale(b.id,b.label,b.max||10);
    case 'signature': return signatureField(b.id,b.label);
    case 'example': return exampleBox(b.title,b.text);
    case 'closing': return closingText(b.text);
    case 'agentLink': return `<div class="agent-link-box">
      <div class="agent-link-text">${icon('bulb')}<div>${b.text}</div></div>
      <a class="btn btn-primary" href="${b.url}" target="_blank" rel="noopener noreferrer">${b.cta||'פתיחת הסוכן'} ↗</a>
    </div>`;
    case 'cards': return cardsRow(b.items.map(it=>card(it.title,it.blocks.map(renderBlock))));
    case 'sun': return renderSun(b);
    case 'pause': return renderPause(b.text);
    case 'twoWeek': return renderTwoWeek(b);
    case 'html': return b.html;
    default: return '';
  }
}
function renderSun(b){
  const n=b.rayIds.length;
  const R=40;
  const points=b.rayIds.map((id,i)=>{
    const angle=(i*360/n-90)*Math.PI/180;
    const x=50+R*Math.cos(angle);
    const y=50+R*Math.sin(angle);
    return {id,i,x,y};
  });
  const lines=points.map(p=>`<line x1="50" y1="50" x2="${p.x.toFixed(2)}" y2="${p.y.toFixed(2)}"/>`).join('');
  const rays=points.map(p=>`
    <div class="sun-ray-input field track" data-id="${p.id}" data-kind="text" style="left:${p.x.toFixed(2)}%;top:${p.y.toFixed(2)}%;">
      <span class="ray-num">${p.i+1}</span>
      <input class="input" type="text" id="${p.id}" data-field="${p.id}">
    </div>`).join('');
  return `<div class="sun-wrap">
    <div class="sun-diagram">
      <svg class="sun-lines" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>
      <div class="sun-center field track" data-id="${b.centerId}" data-kind="text">
        <div class="field-label">${b.centerLabel}</div>
        <input class="input" type="text" id="${b.centerId}" data-field="${b.centerId}">
      </div>
      ${rays}
    </div>
  </div>`;
}
function renderPause(text){
  return `<div class="pause-banner">${icon('camera')}<div>${text}</div></div>`;
}
function renderTwoWeek(b){
  function col(title,cls,videos){
    const cards=videos.map((v,i)=>`
      <div class="video-card">
        <div class="video-title">סרטון ${i+1}</div>
        ${textInput(v.topic,'נושא:')}
        ${textInput(v.shoot,'מתי אני מצלמ/ת?')}
        ${textInput(v.publish,'מתי אני מעל/ה?')}
      </div>`).join('');
    return `<div class="week-col ${cls}"><div class="week-col-title">${title}</div>${cards}</div>`;
  }
  return `<div class="week-grid">
    ${col('שבוע 1','w1',b.week1)}
    ${col('שבוע 2','w2',b.week2)}
  </div>`;
}

/* ===== page renderers ===== */
function renderPage(p,idx){
  if(p.type==='cover'){
    return `<section class="page page-cover" id="page-${p.id}">
      ${blobsHTML(['var(--pink)','var(--sage)','var(--peach)','var(--lilac)'])}
      ${icon('camera').replace('class="icon"','class="icon cover-icon"')}
      <div class="cover-eyebrow">${p.eyebrow}</div>
      <h1 class="cover-title">${p.title}</h1>
      <p class="cover-quote">${p.quote}</p>
    </section>`;
  }
  if(p.type==='info'){
    return `<section class="page page-info" id="page-${p.id}">
      ${blobsHTML(['var(--sage)','var(--pink)'])}
      ${iconLg('pin')}
      <div class="info-card">${p.text}</div>
      <div class="info-actions">
        <button class="btn btn-primary" data-scrollnext="1">${p.ctaContinue||'התחלתי, בואו נמשיך'}</button>
        <button class="btn btn-ghost" data-action="print">הדפסה</button>
        <button class="btn btn-ghost" data-action="clear">ניקוי תשובות</button>
      </div>
    </section>`;
  }
  if(p.type==='task'){
    return `<section class="page page-task" id="page-${p.id}">
      ${blobsHTML(p.blobColors||['var(--pink)','var(--peach)'])}
      <div class="page-number-badge num">${String(idx).padStart(2,'0')}</div>
      <div class="label-pill">${p.label}</div>
      <h2 class="page-title">${p.title}</h2>
      ${p.intro?`<div class="intro-box">${icon(p.introIcon||'bulb')}<div>${p.intro}</div></div>`:''}
      ${p.explain?`<div class="explain-box">${p.explain}</div>`:''}
      ${p.instructions?instructionsLine(p.instructions):''}
      <div class="stack">${p.body.map(renderBlock).join('')}</div>
    </section>`;
  }
  if(p.type==='final'){
    return `<section class="page page-final" id="page-${p.id}">
      ${blobsHTML(['var(--pink)','var(--lilac)','var(--sage)'])}
      ${iconLg('heart')}
      <h2 class="final-title">${p.title}</h2>
      <p class="final-oath">${p.oathPre}<span class="blank-name"></span>,<br>${p.oathPost}</p>
      <div class="stack" style="max-width:60ch;margin:0 auto;text-align:right;">
        ${p.body.map(renderBlock).join('')}
      </div>
    </section>`;
  }
  return '';
}

/* ===== boot ===== */
function boot(){
  const book=document.getElementById('book');
  book.innerHTML=WORKBOOK.map((p,i)=>renderPage(p,i)).join('');

  // populate jump select
  const jump=document.getElementById('jumpSelect');
  jump.innerHTML='<option value="">קפצו לעמוד…</option>'+WORKBOOK.map(p=>{
    const label=p.type==='task'?`${p.label} — ${p.title}`:(p.title||p.eyebrow||p.id);
    return `<option value="page-${p.id}">${label}</option>`;
  }).join('');
  jump.addEventListener('change',e=>{
    if(e.target.value){document.getElementById(e.target.value).scrollIntoView({behavior:'smooth',block:'start'});}
    jump.value='';
  });

  document.querySelectorAll('[data-scrollnext]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pages=document.querySelectorAll('.page');
      const infoIdx=[...pages].findIndex(p=>p.id==='page-info');
      if(pages[infoIdx+1]) pages[infoIdx+1].scrollIntoView({behavior:'smooth',block:'start'});
    });
  });

  hydrateInputs();
  wireEvents();
  updateProgress();
}

function hydrateInputs(){
  document.querySelectorAll('[data-field]').forEach(el=>{
    const key=el.dataset.field;
    if(el.type==='checkbox'){
      el.checked=!!(STATE[key]&&STATE[key][el.dataset.val]);
    }else{
      if(STATE[key]!==undefined) el.value=STATE[key];
    }
  });
  document.querySelectorAll('.rating-btn').forEach(btn=>{
    const key=btn.dataset.field;
    if(STATE[key]==btn.dataset.rate){btn.setAttribute('aria-pressed','true');}
  });
}

function wireEvents(){
  document.body.addEventListener('input',e=>{
    const el=e.target;
    if(!el.dataset.field) return;
    const key=el.dataset.field;
    if(el.type==='checkbox'){
      STATE[key]=STATE[key]||{};
      STATE[key][el.dataset.val]=el.checked;
    }else{
      STATE[key]=el.value;
      if(el.dataset.otherOf){
        const box=document.getElementById(el.dataset.otherOf);
        if(box && !box.checked && el.value.trim()){
          box.checked=true;
          STATE[box.dataset.field]=STATE[box.dataset.field]||{};
          STATE[box.dataset.field][box.dataset.val]=true;
        }
      }
    }
    saveState();
  });
  document.body.addEventListener('click',e=>{
    const btn=e.target.closest('.rating-btn');
    if(btn){
      const key=btn.dataset.field;
      const group=btn.parentElement.querySelectorAll('.rating-btn');
      group.forEach(b=>b.setAttribute('aria-pressed', b===btn ? 'true':'false'));
      STATE[key]=btn.dataset.rate;
      saveState();
    }
    if(e.target.closest('[data-action="print"]')) window.print();
    if(e.target.closest('[data-action="clear"]')) clearAnswers();
  });
  document.getElementById('printBtn').addEventListener('click',()=>window.print());
  document.getElementById('exportBtn').addEventListener('click',exportAnswers);
  document.getElementById('clearBtn').addEventListener('click',clearAnswers);
}

/* ===== export answers to a text file ===== */
function stripTags(s){return (s||'').replace(/<br\s*\/?>/gi,' ').replace(/<[^>]+>/g,'').trim();}
function collectBlockText(b,out,prefix,context){
  switch(b.b){
    case 'text': case 'date': case 'signature': {
      const v=STATE[b.id];
      if(v && v.trim()) out.push(`${prefix}${b.label} ${v.trim()}`);
      break;
    }
    case 'textarea': {
      const v=STATE[b.id];
      if(v && v.trim()) out.push(`${prefix}${b.label}\n${v.trim()}`);
      break;
    }
    case 'numbered': {
      const items=[];
      b.items.forEach((_,i)=>{
        const id=`${b.idPrefix}_${i+1}`;
        const v=STATE[id];
        if(v && v.trim()) items.push(`${i+1}. ${v.trim()}`);
      });
      if(items.length){
        const question=stripTags(b.lead)||context;
        if(question) out.push(`${prefix}${question}`);
        items.forEach(it=>out.push(`${prefix}${it}`));
      }
      break;
    }
    case 'checkbox': {
      const chosen=b.options.filter(o=>STATE[b.id]&&STATE[b.id][o.value]).map(o=>{
        if(o.other){
          const free=STATE[`${b.id}_other`];
          return free && free.trim() ? `אחר: ${free.trim()}` : 'אחר';
        }
        return o.label;
      });
      if(chosen.length) out.push(`${prefix}${b.heading||''} ${chosen.join(', ')}`);
      break;
    }
    case 'rating': {
      const v=STATE[b.id];
      if(v) out.push(`${prefix}${b.label} ${v}/10`);
      break;
    }
    case 'sun': {
      const c=STATE[b.centerId];
      if(c && c.trim()) out.push(`${prefix}${b.centerLabel} ${c.trim()}`);
      b.rayIds.forEach((id,i)=>{
        const v=STATE[id];
        if(v && v.trim()) out.push(`${prefix}אסוציאציה ${i+1}: ${v.trim()}`);
      });
      break;
    }
    case 'twoWeek': {
      ['week1','week2'].forEach((wk,wi)=>{
        b[wk].forEach((v,vi)=>{
          const topic=STATE[v.topic],shoot=STATE[v.shoot],pub=STATE[v.publish];
          if((topic&&topic.trim())||(shoot&&shoot.trim())||(pub&&pub.trim())){
            out.push(`${prefix}שבוע ${wi+1} — סרטון ${vi+1}: נושא: ${topic||'—'} | מתי מצלמ/ת: ${shoot||'—'} | מתי מעל/ה: ${pub||'—'}`);
          }
        });
      });
      break;
    }
    case 'cards': {
      b.items.forEach(card=>{
        let cardContext='';
        card.blocks.forEach(cb=>{
          if(cb.b==='section'||cb.b==='p') cardContext=stripTags(cb.text);
          collectBlockText(cb,out,`[${card.title}] `,cardContext);
        });
      });
      break;
    }
  }
}
function exportAnswers(){
  const lines=['חוברת עבודה — קורס יצירת תוכן','התשובות שמולאו בחוברת:',''];
  WORKBOOK.forEach(p=>{
    if(p.type!=='task' && p.type!=='final') return;
    const out=[];
    let context='';
    (p.body||[]).forEach(b=>{
      if(b.b==='section'||b.b==='p') context=stripTags(b.text);
      collectBlockText(b,out,'',context);
    });
    if(out.length){
      lines.push(`=== ${p.label?p.label+' — ':''}${p.title} ===`);
      out.forEach(l=>lines.push(l));
      lines.push('');
    }
  });
  if(lines.length<=3){
    alert('עדיין אין תשובות שמורות בחוברת הזו — אין מה לייצא.');
    return;
  }
  const text=lines.join('\n');
  const blob=new Blob([text],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='התשובות-שלי-קורס-יצירת-תוכן.txt';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function clearAnswers(){
  if(!confirm('למחוק את כל התשובות שמילאת בחוברת? פעולה זו לא ניתנת לביטול.')) return;
  STATE={};
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('[data-field]').forEach(el=>{
    if(el.type==='checkbox') el.checked=false; else el.value='';
  });
  document.querySelectorAll('.rating-btn').forEach(b=>b.setAttribute('aria-pressed','false'));
  updateProgress();
}

function updateProgress(){
  const tracks=document.querySelectorAll('.track');
  let filled=0;
  tracks.forEach(t=>{
    const kind=t.dataset.kind;
    if(kind==='checkgroup'){
      const any=[...t.querySelectorAll('input[type=checkbox]')].some(c=>c.checked);
      if(any) filled++;
    }else if(kind==='rating'){
      const any=[...t.querySelectorAll('.rating-btn')].some(b=>b.getAttribute('aria-pressed')==='true');
      if(any) filled++;
    }else{
      const input=t.querySelector('input,textarea');
      if(input && input.value.trim().length>0) filled++;
    }
  });
  const pct=tracks.length?Math.round(filled/tracks.length*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=pct+'%';
}

document.addEventListener('DOMContentLoaded',boot);

</script>
